name: CI

on:
  push:
    branches: [main]
    paths:
      - "*/Dockerfile"
      - "entrypoint/**"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commits:
    name: Validate commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install cocogitto
        run: |
          curl -sSL https://github.com/cocogitto/cocogitto/releases/latest/download/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz | tar xz --strip-components=1 -C /usr/local/bin
      - name: Validate commits
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.event.pull_request.base.ref }} HEAD)
          cog check "$BASE_SHA..HEAD"

  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [alpine/Dockerfile, ubuntu/Dockerfile, wolfi/Dockerfile]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run ShellCheck
        run: shellcheck entrypoint/entrypoint.sh

  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
          - variant: ubuntu
            dockerfile: ubuntu/Dockerfile
          - variant: wolfi
            dockerfile: wolfi/Dockerfile
          - variant: distroless-static
            dockerfile: distroless-static/Dockerfile
          - variant: distroless-python
            dockerfile: distroless-python/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3
      - name: Build (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false

  scan:
    name: Scan ${{ matrix.variant }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            severity: CRITICAL
          - variant: ubuntu
            dockerfile: ubuntu/Dockerfile
            severity: CRITICAL,HIGH
          - variant: wolfi
            dockerfile: wolfi/Dockerfile
            severity: CRITICAL,HIGH
          - variant: distroless-static
            dockerfile: distroless-static/Dockerfile
            severity: CRITICAL
          - variant: distroless-python
            dockerfile: distroless-python/Dockerfile
            severity: CRITICAL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: scan-${{ matrix.variant }}:latest
      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: scan-${{ matrix.variant }}:latest
          format: table
          exit-code: 1
          severity: ${{ matrix.severity }}

  smoke:
    name: Smoke test ${{ matrix.variant }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            has_shell: true
          - variant: ubuntu
            dockerfile: ubuntu/Dockerfile
            has_shell: true
          - variant: wolfi
            dockerfile: wolfi/Dockerfile
            has_shell: true
          - variant: distroless-static
            dockerfile: distroless-static/Dockerfile
            has_shell: false
          - variant: distroless-python
            dockerfile: distroless-python/Dockerfile
            has_shell: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build for testing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: smoke-${{ matrix.variant }}:latest

      - name: Test default user
        if: matrix.has_shell
        run: |
          RESULT=$(docker run --rm smoke-${{ matrix.variant }}:latest whoami)
          echo "whoami: ${RESULT}"
          [ "${RESULT}" = "gizmo" ] || { echo "FAIL: expected gizmo, got ${RESULT}"; exit 1; }

      - name: Test PUID/PGID
        if: matrix.has_shell
        run: |
          RESULT=$(docker run --rm -u root -e PUID=1001 -e PGID=1001 smoke-${{ matrix.variant }}:latest id)
          echo "id: ${RESULT}"
          echo "${RESULT}" | grep -q "uid=1001" || { echo "FAIL: expected uid=1001"; exit 1; }

      - name: Test distroless runs
        if: "!matrix.has_shell"
        run: |
          docker inspect smoke-${{ matrix.variant }}:latest > /dev/null 2>&1
          echo "Image exists and is valid"
