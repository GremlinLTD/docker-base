name: Release

on:
  schedule:
    - cron: "0 6 * * 1,4" # Monday and Thursday at 6 AM
  push:
    branches: [main]
    paths:
      - "*/Dockerfile"
      - "entrypoint/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    name: Push ${{ matrix.variant }}
    if: github.actor != 'gremlinltd-release-bot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: alpine/Dockerfile
            tag_prefix: alpine
          - variant: ubuntu
            dockerfile: ubuntu/Dockerfile
            tag_prefix: ubuntu
          - variant: wolfi
            dockerfile: wolfi/Dockerfile
            tag_prefix: wolfi
          - variant: distroless-static
            dockerfile: distroless-static/Dockerfile
            tag_prefix: distroless-static
          - variant: distroless-python
            dockerfile: distroless-python/Dockerfile
            tag_prefix: distroless-python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v3
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: tags
        run: |
          FROM_LINE=$(head -1 ${{ matrix.dockerfile }})
          case "${{ matrix.variant }}" in
            alpine)
              # FROM alpine:3 -> alpine-3 (rolling)
              # Resolve actual version for pinned tag
              VERSION=$(docker pull alpine:3 2>/dev/null | grep -oP 'alpine:3\.\d+' | head -1 | cut -d: -f2 || echo "3")
              if [ -n "${VERSION}" ] && [ "${VERSION}" != "3" ]; then
                MAJOR=$(echo "${VERSION}" | cut -d. -f1)
                echo "tags=ghcr.io/gremlinltd/base:alpine-${MAJOR},ghcr.io/gremlinltd/base:alpine-${VERSION}" >> "$GITHUB_OUTPUT"
              else
                echo "tags=ghcr.io/gremlinltd/base:alpine-3" >> "$GITHUB_OUTPUT"
              fi
              ;;
            ubuntu)
              # FROM ubuntu:24.04 -> ubuntu-24, ubuntu-24.04
              VERSION=$(echo "${FROM_LINE}" | grep -oP '[\d]+\.[\d]+' | head -1)
              MAJOR=$(echo "${VERSION}" | cut -d. -f1)
              echo "tags=ghcr.io/gremlinltd/base:ubuntu-${MAJOR},ghcr.io/gremlinltd/base:ubuntu-${VERSION}" >> "$GITHUB_OUTPUT"
              ;;
            wolfi)
              # Wolfi is rolling release, single tag
              echo "tags=ghcr.io/gremlinltd/base:wolfi" >> "$GITHUB_OUTPUT"
              ;;
            distroless-static)
              echo "tags=ghcr.io/gremlinltd/base:distroless-static-13" >> "$GITHUB_OUTPUT"
              ;;
            distroless-python)
              echo "tags=ghcr.io/gremlinltd/base:distroless-python-13" >> "$GITHUB_OUTPUT"
              ;;
          esac
          echo "Generated tags: $(cat "$GITHUB_OUTPUT")"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  changelog:
    name: Generate changelog
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit changelog
        run: |
          git config user.name "gremlinltd-release-bot[bot]"
          git config user.email "gremlinltd-release-bot[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update changelog"
            git push origin main
          fi
